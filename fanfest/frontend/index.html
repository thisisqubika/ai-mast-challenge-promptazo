<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tribuna — Fan Fests</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.21.0/dist/tabler-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/main.css">
<link rel="stylesheet" href="./assets/css/live.css">

<link rel="stylesheet" href="./assets/css/event.css">

</head>
<body>
<div class="stage">
  <div class="phone">

    <!-- STATUS BAR -->
    <div class="statusbar">
      <span class="statusbar__time">9:41</span>
      <div class="statusbar__icons">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="#f1f5f9"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1" fill="#f1f5f9"/><rect x="9" y="2" width="3" height="10" rx="1" fill="#f1f5f9"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#f1f5f9"/></svg>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 2.6c2.3 0 4.4.9 6 2.4l-1.5 1.6a6.4 6.4 0 0 0-9 0L2.5 5C4.1 3.5 6.2 2.6 8.5 2.6Z" fill="#f1f5f9"/><path d="M8.5 6.2c1.3 0 2.5.5 3.4 1.4L8.5 11 5.1 7.6A4.8 4.8 0 0 1 8.5 6.2Z" fill="#f1f5f9"/></svg>
        <div class="statusbar__battery"><div class="statusbar__battery-fill"></div></div>
      </div>
    </div>

    <!-- SCROLL AREA -->
    <div class="scroll">

      <!-- GREETING -->
      <div class="greeting">
        <span class="greeting__hi">Hola, Matías 👋</span>
        <div class="avatar">MA</div>
      </div>

      <!-- PILL ROW -->
      <div class="pill-row">
        <button class="pill pill--location" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 21C12 21 5 13.5 5 9a7 7 0 0 1 14 0c0 4.5-7 12-7 12Z" stroke="#64748b" stroke-width="2" stroke-linejoin="round"></path><circle cx="12" cy="9" r="2.5" stroke="#64748b" stroke-width="2"></circle></svg>
          <span class="pill__flag">🇦🇷</span>
          <span class="pill__text">Córdoba, AR</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        </button>
        <button class="pill pill--search" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#64748b" stroke-width="2"></circle><path d="m20 20-3-3" stroke="#64748b" stroke-width="2" stroke-linecap="round"></path></svg>
          <span class="pill__muted">Buscar</span>
        </button>
      </div>

      <!-- CATEGORY TABS -->
      <div class="cat-scroll">
        <div class="cat-tabs" id="catTabs"></div>
      </div>
      <div class="divider divider--cat"></div>

      <!-- SECTION 1 -->
      <div class="section">
        <div class="section__head">
          <div class="section__title">Apoyá a la Selección 🇦🇷</div>
          <button class="see-all" type="button">Ver todos →</button>
        </div>
        <div class="section__sub">Argentina vs México · Hoy 21:00</div>
      </div>
      <div class="row">
        <div class="row__scroll"><div class="row__track" id="rowSeleccion"></div></div>
        <div class="row__fade"></div>
      </div>

      <!-- SECTION 2 -->
      <div class="section__head section__head--spaced">
        <div class="section__title section__title--label">El mundo juega hoy 🌍</div>
        <button class="see-all" type="button">Ver todos →</button>
      </div>
      <div class="row">
        <div class="row__scroll"><div class="row__track" id="rowWorld"></div></div>
        <div class="row__fade"></div>
      </div>

      <!-- SECTION 3 -->
      <div class="section">
        <div class="section__head">
          <div class="section__title section__title--label">Reviví fan fests pasados ✨</div>
          <button class="see-all" type="button">Ver todos →</button>
        </div>
        <div class="section__sub section__sub--dim">Con crónica generada por IA</div>
      </div>
      <div class="row">
        <div class="row__scroll"><div class="row__track" id="rowRecap"></div></div>
        <div class="row__fade"></div>
      </div>

      <!-- SECTION 4 -->
      <div class="section__head section__head--spaced">
        <div class="section__title section__title--label">Próximos fan fests 📅</div>
        <button class="see-all" type="button">Ver todos →</button>
      </div>
      <div class="row">
        <div class="row__scroll"><div class="row__track" id="rowUpcoming"></div></div>
        <div class="row__fade"></div>
      </div>

    </div>

    <!-- BOTTOM NAV -->
    <div class="bottomnav">
      <div class="live-bar">
        <div class="live-bar__info">
          <div class="live-bar__label">Partido en vivo</div>
          <div class="live-bar__match">Argentina vs México</div>
        </div>
        <button class="live-bar__cta" type="button">📍 Estoy aquí</button>
      </div>
      <div class="navtabs" id="navTabs"></div>
    </div>

    <div id="eventView"></div>

  </div>
</div>
<div id="liveView"></div>
<div id="recapView"></div>
<script src="./assets/js/main.js"></script>
<script type="module" src="./assets/js/live.js"></script>
<script type="module" src="./assets/js/event.js"></script>

</body>
</html>
